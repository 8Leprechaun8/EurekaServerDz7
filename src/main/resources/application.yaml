configuration-server:
  instance:
    hostname: ${CONFIG_HOST:localhost}
    port: ${CONFIG_PORT:8071}
spring:
  application:
    name: eureka-server
  profiles:
    active: dev
  config:
    import: optional:configserver:http://${configuration-server.instance.hostname}:${configuration-server.instance.port}
  cloud:
    loadbalancer:
      ribbon:
        enable: false